<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>examen</title>
</head>

<body>

    <div class="container">
        <table action="/mensajes" method="GET">
            <thead>
                <tr>
                    <th>id</th>
                    <th>usuario</th>
                    <th>mensaje</th>
                    <th>fecha</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td type="text" id="mensajes.id"></td>
                </tr>
            </tbody>
        </table>
    </div>
    
        
    <form action="/mensajes" method="POST">
        <fieldset>
            <legend>POST</legend>
            
            <label for="pass">Contraseña:</label>
            <input type="text" id="pass" name="pass" ${7|required,|}>
            
            <label for="usuario">Usuario:</label>
            <textarea id="usuario" name="usuario" rows="1"></textarea>
            
            <label for="contenido">Contenido:</label>
            <textarea id="contenido" name="contenido" rows="4"></textarea>
            
            <button type="submit">Enviar</button>
        </fieldset>
    </form>

    <div>
        <script scr="index.ts"></script>
    </div>
</body>

</html>
