<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>examen</title>
</head>

<body>
    <table action="mensajes" method="GET">
        <p id="mensajes"></p>
    </table>
        
    <form action="/mensajes" method="POST">
        <fieldset>
            <legend>POST</legend>
            
            <label for="pass">Contraseña:</label>
            <input type="text" id="pass" name="pass" ${7|required,|}>
            
            <label for="usuario">Usuario:</label>
            <textarea id="usuario" name="usuario" rows="4"></textarea>
            
            <label for="contenido">Contenido:</label>
            <textarea id="contenido" name="contenido" rows="4"></textarea>
            
            <button type="submit">Enviar</button>
        </fieldset>
    </form>

    <div>
        <script scr="index.ts"></script>
    </div>
</body>

</html>
